services:
  forensiccloud:
    build: .
    image: forensiccloud:latest
    container_name: forensiccloud
    ports:
      - "8000:8000"
    volumes:
      - sessions:/data/sessions
    environment:
      HOST: "0.0.0.0"
      OPEN_BROWSER: "0"
      FORENSICCLOUD_WORK_DIR: /data/sessions
    # GPU reservation — requires Docker Compose v2 (the `docker compose` plugin)
    # and the NVIDIA Container Toolkit installed on the host.
    # Remove the `deploy` block entirely if you have no NVIDIA GPU.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  sessions:
    driver: local
